<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Эмулятор датчиков воды</title>
  <style>
    :root {
      --bg: #0f172a;
      --card: #1e293b;
      --border: #334155;
      --text: #e2e8f0;
      --muted: #94a3b8;
      --accent: #38bdf8;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      padding: 20px 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
    }
    h1 { font-size: 1.4rem; color: var(--accent); margin-bottom: 6px; text-align: center; }
    .sub { font-size: 0.85rem; color: var(--muted); margin-bottom: 24px; text-align: center; }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 16px;
      width: 100%;
      max-width: 900px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 18px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }
    .title { color: var(--muted); font-size: 0.9rem; margin-bottom: 10px; }
    .val { font-size: 2rem; font-weight: 700; color: #fff; font-variant-numeric: tabular-nums; }
    .unit { font-size: 1rem; font-weight: 400; color: #64748b; margin-left: 4px; }
    .range { font-size: 0.75rem; color: #475569; margin-top: 8px; }

    .hint {
      margin-top: 28px;
      padding: 12px 16px;
      background: #0b1120;
      border: 1px dashed var(--border);
      border-radius: 8px;
      font-size: 0.82rem;
      color: var(--muted);
      text-align: center;
      width: 100%;
      max-width: 900px;
    }
    code { background: #1e293b; padding: 2px 5px; border-radius: 4px; color: #cbd5e1; }

    @media (max-width: 480px) {
      h1 { font-size: 1.25rem; }
      .grid { grid-template-columns: 1fr; }
      .val { font-size: 1.8rem; }
    }
  </style>
</head>
<body>
  <h1>💧 Эмулятор датчиков минеральной воды</h1>
  <p class="sub">Обновление каждые 3 сек · Данные генерируются в заданных диапазонах</p>

  <div class="grid" id="dashboard"></div>

  <div class="hint">
    📡 <strong>API:</strong> добавьте <code>?api</code> в конец URL для получения JSON<br>
    Пример: <code>https://ваш-ник.github.io/репозиторий/?api</code>
  </div>

  <script>
    const SENSORS = [
      { key: 'ph',       label: 'pH (Водородный показатель)', min: 6.0,  max: 8.5,  decimals: 2 },
      { key: 'mineral',  label: 'Минерализация',              min: 50,   max: 500,  decimals: 1 },
      { key: 'temp',     label: 'Температура',                min: 4,    max: 25,   decimals: 1 },
      { key: 'conduct',  label: 'Электропроводимость',        min: 100,  max: 1000, decimals: 1 },
      { key: 'turbid',   label: 'Мутность',                   min: 0,    max: 4,    decimals: 2 },
      { key: 'pressure', label: 'Давление в системе',         min: 2,    max: 6,    decimals: 2 }
    ];
    const UNITS = { ph: '', mineral: 'мг/л', temp: '°C', conduct: 'мкСм/см', turbid: 'NTU', pressure: 'бар' };

    function generate() {
      const now = new Date().toISOString();
      const res = { timestamp: now, sensors: {} };
      SENSORS.forEach(s => {
        const v = parseFloat((Math.random() * (s.max - s.min) + s.min).toFixed(s.decimals));
        res.sensors[s.key] = { value: v, unit: UNITS[s.key] };
      });
      return res;
    }

    // Режим API: отдаём только JSON
    if (new URLSearchParams(window.location.search).has('api')) {
      document.body.innerHTML = `<pre style="padding:20px;white-space:pre-wrap;word-break:break-all;">${JSON.stringify(generate(), null, 2)}</pre>`;
      throw 'API';
    }

    // Режим Dashboard
    const dashboard = document.getElementById('dashboard');
    function render() {
      const data = generate();
      dashboard.innerHTML = SENSORS.map(s => `
        <div class="card">
          <div class="title">${s.label}</div>
          <div class="val">${data.sensors[s.key].value}<span class="unit">${UNITS[s.key]}</span></div>
          <div class="range">Диапазон: ${s.min} – ${s.max}</div>
        </div>
      `).join('');
    }
    render();
    setInterval(render, 3000);
  </script>
</body>
</html>
